name: Build rexglue-sdk win

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install LLVM, CMake, Ninja
        run: |
          choco install llvm cmake ninja -y

      - name: Configure (CMake preset)
        run: cmake --preset win-amd64

      - name: Make Install
        run: cmake --build out/build/win-amd64 --target install -j20

      - name: Read version
        id: version
        shell: bash
        run: |
          v=$(sed -nE 's/^#define REXGLUE_VERSION_STRING "([^"]+)".*/\1/p' \
            out/build/win-amd64/include/rex/version.h)
          echo "v=${v}" >> "$GITHUB_OUTPUT"

      - name: Package
        shell: bash
        run: |
          cd out/install
          7z a "rexglue-sdk-${{ steps.version.outputs.v }}-win-amd64.zip" win-amd64

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: out/install/rexglue-sdk-*-win-amd64.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
